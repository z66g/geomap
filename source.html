<style>
:root{
  --bg:#000000;--surface:rgba(10,10,10,0.97);--surface2:rgba(18,18,18,0.98);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);--border3:rgba(255,255,255,0.08);
  --text:#f2f2f2;--muted:#b0b0b0;--muted2:#888;
  --us:#1a3a8f;--cn:#f03030;--swing:#f0b800;--neutral:#1db954;
  --geo:#ff7700;--res:#1db954;--ind:#1a3a8f;--risk:#f03030;
  --green:#43e897;--red:#ff4b6e;--yellow:#ffd060;--blue:#ffffff;--purple:#c084fc;
  --sidebar:285px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000005;color:var(--text);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* ── FULL-SCREEN STAR CANVAS ── */
#star-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── TOP BRAND BAR ── */
#brand-bar{height:44px;min-height:44px;background:rgba(6,6,6,0.92);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:20;flex-shrink:0;position:relative;backdrop-filter:blur(6px);}
#brand-logo{font-size:11.5px;font-weight:800;letter-spacing:.12em;color:var(--blue);white-space:nowrap;text-shadow:0 0 12px rgba(255,255,255,0.3);}
.live-pip{display:flex;align-items:center;gap:5px;margin-left:2px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22ee66;box-shadow:0 0 7px #22ee66;animation:pdot 2s infinite;}
@keyframes pdot{0%,100%{opacity:1;}50%{opacity:.3;}}
.live-txt{font-size:9.5px;font-weight:700;color:#22ee66;letter-spacing:.06em;}
.brand-links{display:flex;gap:6px;margin-left:auto;align-items:center;}
.bl{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;padding:5px 12px;border-radius:7px;border:1px solid;cursor:pointer;text-decoration:none;transition:all .18s;white-space:nowrap;line-height:1;}
.bl:hover{transform:translateY(-1px);filter:brightness(1.3);}
.bl.th{border-color:rgba(220,220,220,0.25);color:#d0d0d0;background:rgba(255,255,255,0.05);}
.bl.yt{border-color:rgba(255,60,60,0.5);color:#ff5050;background:rgba(255,40,40,0.08);}
.bl.tg{border-color:rgba(41,168,210,0.45);color:#29a8d2;background:rgba(41,168,210,0.08);}
.bl.nv{border-color:rgba(0,200,70,0.5);color:#00c846;background:rgba(0,200,70,0.08);}
.bl-icon{display:flex;align-items:center;flex-shrink:0;}

/* ── MAIN ── */
#main-layout{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:rgba(8,8,8,0.85);border-right:1px solid var(--border2);display:flex;flex-direction:column;height:100%;overflow:hidden;z-index:10;backdrop-filter:blur(20px);}
#logo{padding:11px 13px 9px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:7px;flex-shrink:0;}
#logo-icon{font-size:16px;}
#logo-text{font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--blue);text-shadow:none;}
#logo-sub{font-size:9px;color:var(--muted);margin-top:1px;}
#tabs{display:flex;padding:6px 8px 0;gap:2px;border-bottom:1px solid var(--border2);flex-shrink:0;}
.tab{flex:1;font-size:10px;padding:5px 2px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;text-align:center;white-space:nowrap;}
.tab.active{color:var(--text);border-bottom-color:var(--blue);font-weight:700;}
.tab:hover:not(.active){color:var(--text);}
.tab-panel{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.tab-panel.active{display:flex;}
.tab-panel::-webkit-scrollbar{width:3px;}
.tab-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:3px;}

/* COMBINED FILTER */
#filter-section{padding:9px 11px 7px;flex-shrink:0;border-bottom:1px solid var(--border);}
.sec-label{font-size:8.5px;color:var(--muted);font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px;}
.filter-group{margin-bottom:7px;}
.filter-group:last-child{margin-bottom:0;}
.f-chips{display:flex;gap:4px;flex-wrap:wrap;}
.f-btn{font-size:9.5px;padding:3px 9px;border:1px solid;border-radius:20px;cursor:pointer;background:transparent;transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap;opacity:.55;}
.f-btn .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.f-btn.active{opacity:1;}
.f-btn:hover{opacity:.85;}
/* layer filter colors */
.f-btn[data-layer]{border-color:rgba(255,255,255,0.15);color:var(--muted);}
.f-btn[data-layer].active{border-color:rgba(255,255,255,.22);color:var(--text);background:rgba(255,255,255,.05);}
/* align filter colors */
.f-btn[data-align="all"]{border-color:rgba(255,255,255,0.15);color:var(--muted);}
.f-btn[data-align="all"].active{border-color:rgba(255,255,255,.25);color:var(--text);background:rgba(255,255,255,.04);}
.f-btn[data-align="us"]{border-color:rgba(255,255,255,.22);color:var(--us);}
.f-btn[data-align="us"].active{background:rgba(255,255,255,.07);}
.f-btn[data-align="cn"]{border-color:rgba(255,75,110,.3);color:var(--cn);}
.f-btn[data-align="cn"].active{background:rgba(255,75,110,.08);}
.f-btn[data-align="swing"]{border-color:rgba(255,208,96,.3);color:var(--swing);}
.f-btn[data-align="swing"].active{background:rgba(255,208,96,.08);}

/* ── 스크롤 인디케이터 ── */
#country-section{padding:0 10px 8px;overflow-y:auto;height:100%;scrollbar-width:none;}
#country-section::-webkit-scrollbar{display:none;}
#scroll-fade{position:absolute;bottom:0;left:0;right:8px;height:40px;background:linear-gradient(transparent,rgba(8,8,8,0.95));pointer-events:none;transition:opacity .3s;}
#scroll-track{position:absolute;top:4px;right:2px;bottom:4px;width:3px;background:rgba(255,255,255,0.06);border-radius:2px;}
#scroll-thumb{position:absolute;right:0;width:3px;background:rgba(255,255,255,0.28);border-radius:2px;transition:opacity .2s;cursor:pointer;}
#scroll-track:hover #scroll-thumb{background:rgba(255,255,255,0.5);width:5px;right:-1px;}
.country-item{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;transition:background .12s;margin-bottom:1px;}
.country-item:hover,.country-item.active{background:rgba(255,255,255,.05);}
.country-flag{font-size:15px;flex-shrink:0;}
.country-info{flex:1;min-width:0;}
.country-name{font-size:11px;font-weight:600;color:var(--text);}
.country-region{font-size:9px;color:var(--muted);}
.align-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;}

/* NEWS */
.news-item{padding:9px 11px;border-bottom:1px solid var(--border);}
.news-item:hover{background:rgba(56,190,255,.03);}
.news-date{font-size:9px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.news-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;}
.news-badge.geo{background:rgba(255,112,67,.18);color:#ff7043;}
.news-badge.res{background:rgba(67,232,151,.18);color:#43e897;}
.news-badge.ind{background:rgba(255,255,255,.13);color:#e8e8e8;}
.news-badge.risk{background:rgba(255,75,110,.18);color:#ff4b6e;}
.news-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:3px;}
.news-body{font-size:10px;color:#bbb;line-height:1.5;}
.news-impact{font-size:9.5px;margin-top:4px;color:var(--yellow);}

/* DETAIL */
#detail-wrap{display:none;flex-direction:column;flex:1;overflow-y:auto;}
#detail-wrap.show{display:flex;}
#detail-wrap::-webkit-scrollbar{width:3px;}
#detail-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.d-empty{padding:28px 12px;text-align:center;color:var(--muted);font-size:11px;line-height:1.7;}
.d-hero{padding:12px 13px 9px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px;}
.d-flag{font-size:25px;}
.d-meta{flex:1;}
.d-name{font-size:15px;font-weight:700;}
.d-sub{font-size:9px;color:var(--muted);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.d-align{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;}
.d-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;}
.d-close:hover{color:var(--text);}
.d-summary{font-size:10.5px;color:#c8c8c8;line-height:1.65;padding:9px 13px;border-bottom:1px solid var(--border);}
.d-section{padding:9px 13px;border-bottom:1px solid var(--border);}
.d-section-title{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;}
.d-section-title.blue{color:var(--blue);}
.d-section-title.green{color:var(--green);}
.d-section-title.yellow{color:var(--yellow);}
.d-section-title.red{color:var(--red);}
.d-section-title.geo{color:var(--geo);}
.d-section-title.res{color:var(--res);}
.rate-card{background:rgba(14,14,14,0.8);border-radius:7px;padding:9px 11px;border:1px solid var(--border3);}
.rate-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;}
.rate-name{font-size:10px;font-weight:600;}
.rate-val{font-size:15px;font-weight:700;}
.rate-meta{font-size:9px;color:#bbb;line-height:1.5;}
.rate-trend{display:flex;align-items:center;gap:4px;margin-top:4px;}
.rate-arrow{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;}
.rate-arrow.hawk{background:rgba(255,75,110,.15);color:#ff8099;}
.rate-arrow.dove{background:rgba(255,255,255,.1);color:#cccccc;}
.rate-arrow.hold{background:rgba(255,208,96,.15);color:var(--yellow);}
.policy-item{display:flex;gap:6px;margin-bottom:6px;}
.policy-bullet{width:4px;height:4px;border-radius:50%;background:var(--blue);margin-top:5px;flex-shrink:0;}
.policy-text{font-size:10px;color:#c0c0c0;line-height:1.6;}
.policy-text b{color:var(--text);}
.tag-cloud{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:9.5px;padding:2px 7px;border-radius:4px;line-height:1.4;}
.tag.geo{background:rgba(255,112,67,.1);color:#ff8a65;border:1px solid rgba(255,112,67,.16);}
.tag.res{background:rgba(67,232,151,.1);color:#43e897;border:1px solid rgba(67,232,151,.16);}
.tag.ind{background:rgba(255,255,255,.08);color:#e8e8e8;border:1px solid rgba(255,255,255,.12);}
.tag.risk{background:rgba(255,75,110,.1);color:#ff8099;border:1px solid rgba(255,75,110,.16);}
.tag.key{background:rgba(255,208,96,.1);color:var(--yellow);border:1px solid rgba(255,208,96,.16);}
.watch-item{display:flex;gap:6px;margin-bottom:6px;}
.watch-icon{font-size:10px;flex-shrink:0;margin-top:1px;}
.watch-text{font-size:10px;color:#c0c0c0;line-height:1.55;}
.watch-text b{color:var(--text);}

/* ── GLOBE ── */
#globe-wrap{flex:1;position:relative;overflow:hidden;background:transparent;z-index:1;}
#star-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;}
#globe-svg{width:100%;height:100%;display:block;position:relative;z-index:1;}
.graticule{fill:none;stroke:rgba(120,150,200,0.07);stroke-width:.4;}
.land{fill:#1e2535;stroke:rgba(160,180,220,0.40);stroke-width:.5;}
.country-label{font-size:9.5px;fill:rgba(230,235,245,0.95);pointer-events:none;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-weight:600;paint-order:stroke fill;stroke:#000000;stroke-width:2px;stroke-linejoin:round;}
.conn-hit{fill:none;stroke:transparent;stroke-width:16px;cursor:pointer;}
#tooltip{position:absolute;background:rgba(8,8,8,0.97);border:1px solid var(--border2);border-radius:8px;padding:7px 11px;font-size:11px;pointer-events:none;display:none;z-index:100;max-width:210px;backdrop-filter:blur(10px);}
#tooltip b{color:var(--text);}
#tooltip small{color:var(--muted);display:block;margin-top:2px;}

/* conn popup */
#conn-popup{position:absolute;z-index:200;display:none;width:308px;}
#conn-popup.show{display:block;}
.cp-card{background:rgba(8,8,8,0.98);border:1px solid var(--border2);border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.8),0 0 30px rgba(255,255,255,0.05);}
.cp-header{padding:10px 13px 9px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px;}
.cp-flags{font-size:18px;letter-spacing:1px;}
.cp-title{font-size:11.5px;font-weight:700;color:var(--text);flex:1;}
.cp-type{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;}
.cp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0;}
.cp-body{padding:11px 13px;display:flex;flex-direction:column;gap:9px;max-height:360px;overflow-y:auto;}
.cp-body::-webkit-scrollbar{width:3px;}
.cp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.cp-sec-label{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
.cp-sec-label.blue{color:var(--blue);}
.cp-sec-label.green{color:var(--green);}
.cp-sec-label.yellow{color:var(--yellow);}
.cp-sec-label.red{color:var(--red);}
.cp-row{display:grid;grid-template-columns:80px 1fr;gap:6px;align-items:baseline;margin-bottom:5px;}
.cp-row-label{font-size:9px;color:var(--muted);white-space:nowrap;}
.cp-row-val{font-size:10px;font-weight:600;color:var(--text);text-align:left;word-break:keep-all;line-height:1.5;}
.cp-watch{font-size:9.5px;color:var(--yellow);line-height:1.6;word-break:keep-all;}
.cp-note{font-size:9.5px;color:#bbb;line-height:1.6;}
.cp-watch{font-size:9.5px;color:var(--yellow);}

#globe-controls{position:absolute;bottom:14px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:5;}
.globe-btn{width:29px;height:29px;background:rgba(8,8,8,0.85);border:1px solid var(--border2);border-radius:6px;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(6px);}
.globe-btn:hover{background:rgba(255,255,255,.08);color:var(--text);border-color:rgba(255,255,255,.3);}
#legend{position:absolute;bottom:14px;left:12px;background:rgba(8,8,8,0.88);border:1px solid var(--border2);border-radius:9px;padding:8px 11px;z-index:5;backdrop-filter:blur(8px);}
.leg-title{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.leg-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-bottom:3px;}
.leg-row:last-child{margin-bottom:0;}
.leg-dot{width:7px;height:7px;border-radius:50%;}
.leg-line{width:15px;height:2px;border-radius:1px;}
.econ-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px;}
.econ-card{background:rgba(14,14,14,0.8);border-radius:6px;padding:7px 9px;border:1px solid var(--border3);}
.econ-card.econ-wide{grid-column:span 1;}
.econ-card.econ-full{grid-column:span 2;}
.econ-label{font-size:8.5px;color:var(--muted2);margin-bottom:3px;letter-spacing:.04em;}
.econ-val{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
.econ-context{font-size:10px;color:#bbb;line-height:1.6;padding:8px 0 2px;border-top:1px solid var(--border);}
/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  body{flex-direction:column;}
  #brand-bar{padding:0 10px;gap:7px;height:40px;min-height:40px;}
  #brand-logo{font-size:10px;}
  #brand-logo img{width:18px;height:18px;}
  /* 모바일: 링크 텍스트 숨기고 아이콘+테두리만 표시 */
  .bl{padding:5px 8px;gap:0;font-size:0;border-radius:7px;min-width:32px;justify-content:center;}
  .bl svg{width:14px;height:14px;flex-shrink:0;}
  #main-layout{flex-direction:column;flex:1;}
  #sidebar{width:100%;min-width:0;height:auto;max-height:44vh;flex-direction:column;border-right:none;border-bottom:1px solid var(--border2);}
  #globe-wrap{flex:1;min-height:56vw;}
  #filter-section{padding:7px 10px 5px;}
  .f-chips{gap:3px;}
  .f-btn{font-size:9px;padding:3px 7px;}
  #country-section-wrap{flex:1;overflow:hidden;}
  #country-section{flex:1;overflow-y:auto;}
  #legend{bottom:8px;left:8px;padding:6px 9px;}
  .leg-title{font-size:7.5px;margin-bottom:4px;}
  .leg-row{font-size:9px;margin-bottom:2px;}
  #globe-controls{bottom:8px;right:8px;}
  .globe-btn{width:26px;height:26px;font-size:12px;}
  #hint{display:none;}
  #conn-popup{width:calc(100vw - 20px);max-width:340px;}
}
@media(max-width:480px){
  .brand-links{gap:5px;}
  .bl{min-width:30px;padding:5px 7px;}
  .bl svg{width:13px;height:13px;}
  #brand-logo{font-size:9px;}
  #brand-logo img{width:16px;height:16px;}
  #sidebar{max-height:40vh;}
  .econ-grid{grid-template-columns:1fr 1fr;}
}
/* ── 국가 오늘의 변동 배지 ── */
.update-badge{display:inline-flex;align-items:center;gap:4px;font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:8px;}
.update-badge.positive{background:rgba(67,232,151,.15);color:#43e897;border:1px solid rgba(67,232,151,.25);}
.update-badge.negative{background:rgba(255,75,110,.15);color:#ff4b6e;border:1px solid rgba(255,75,110,.25);}
.update-badge.neutral{background:rgba(255,255,255,.08);color:#e8e8e8;border:1px solid rgba(255,255,255,.18);}
.update-detail{font-size:10px;color:var(--muted);line-height:1.55;padding:6px 9px;background:rgba(12,12,12,.7);border-radius:5px;border-left:2px solid rgba(255,255,255,.22);margin-bottom:4px;}
.update-date{font-size:8.5px;color:var(--muted2);margin-bottom:6px;}
.res-item{background:rgba(12,12,12,0.7);border-radius:6px;padding:8px 10px;margin-bottom:6px;border:1px solid var(--border3);}
.res-name{font-size:10.5px;font-weight:700;color:var(--green);margin-bottom:4px;}
.res-why{font-size:10px;color:#bfbfbf;line-height:1.58;margin-bottom:4px;}
.res-invest{font-size:9.5px;color:#ffd060;line-height:1.5;}
.res-note{font-size:10px;color:var(--muted);line-height:1.6;padding:6px 0 0;border-top:1px solid var(--border);margin-top:4px;font-style:italic;}
/* ── 역사 섹션 ── */
.hist-body{font-size:10px;color:#bcbcbc;line-height:1.75;}
.hist-body b{color:var(--text);font-size:10.5px;}
/* ── 뉴스 자동업데이트 패널 ── */
#live-news-panel{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
#live-news-panel::-webkit-scrollbar{width:3px;}
#live-news-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.ln-loading{padding:20px 14px;text-align:center;color:var(--muted);font-size:11px;}
.ln-loading .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ln-item{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;}
.ln-item:hover{background:rgba(56,190,255,.04);}
.ln-date{font-size:9px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.ln-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;}
.ln-badge.geo{background:rgba(255,112,67,.18);color:#ff7043;}
.ln-badge.eco{background:rgba(255,255,255,.13);color:#e8e8e8;}
.ln-badge.war{background:rgba(255,75,110,.18);color:#ff4b6e;}
.ln-badge.res{background:rgba(67,232,151,.18);color:#43e897;}
.ln-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.45;margin-bottom:3px;}
.ln-body{font-size:10px;color:#bbb;line-height:1.5;}
.ln-impact{font-size:9.5px;color:#ffd060;margin-top:3px;}
.ln-refresh{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border2);flex-shrink:0;}
.ln-refresh-btn{font-size:10px;padding:4px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:5px;color:var(--blue);cursor:pointer;transition:all .15s;}
.ln-refresh-btn:hover{background:rgba(255,255,255,.1);}
.ln-refresh-btn:disabled{opacity:.4;cursor:default;}
.ln-status{font-size:9px;color:var(--muted);}
#hint{position:absolute;top:11px;left:50%;transform:translateX(-50%);font-size:9.5px;color:var(--muted);background:rgba(8,8,8,0.8);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;pointer-events:none;z-index:4;backdrop-filter:blur(6px);}

<body>

<!-- FULL-SCREEN STAR CANVAS — body level so it covers everything -->
<canvas id="star-canvas"></canvas>

// ── STAR CANVAS (full-screen, body-level) ──
(function(){
  const canvas=document.getElementById("star-canvas");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  let stars=[];
  function rand(a,b){return a+Math.random()*(b-a);}
  function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    stars=[];
    for(let i=0;i<3500;i++){
      const bright=i<60; // 60개는 밝고 큰 별
      stars.push({
        x:rand(0,canvas.width),y:rand(0,canvas.height),
        r:bright?rand(1.0,2.2):rand(.1,1.0),
        vx:rand(-.02,.02),vy:rand(-.02,.02),
        baseOp:bright?rand(.5,.95):rand(.08,.65),
        phase:rand(0,Math.PI*2),
        twinkleSpeed:rand(.6,2.0)
      });
    }
  }
  let t=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    t+=0.01;
    stars.forEach(s=>{
      s.x+=s.vx; s.y+=s.vy;
      if(s.x<0)s.x=canvas.width; if(s.x>canvas.width)s.x=0;
      if(s.y<0)s.y=canvas.height; if(s.y>canvas.height)s.y=0;
      const op=s.baseOp*(0.45+0.55*Math.sin(t*(s.twinkleSpeed||1.2)+s.phase));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(190,215,255,${op})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener("resize",resize);
  resize();
  draw();
  // shooting stars
  function shoot(){
    const x=rand(0,window.innerWidth), y=rand(0,window.innerHeight*0.5);
    const angle=rand(20,50)*Math.PI/180;
    const len=rand(80,180);
    let prog=0;
    function frame(){
      prog+=3.5;
      if(prog>len){setTimeout(shoot,rand(3000,9000));return;}
      const frac=prog/len;
      const tailLen=Math.min(prog,50);
      ctx.save();
      ctx.globalAlpha=(1-frac)*0.65;
      const grad=ctx.createLinearGradient(
        x+prog*Math.cos(angle)-tailLen*Math.cos(angle),
        y+prog*Math.sin(angle)-tailLen*Math.sin(angle),
        x+prog*Math.cos(angle),y+prog*Math.sin(angle)
      );
      grad.addColorStop(0,"transparent");
      grad.addColorStop(1,"rgba(200,230,255,0.9)");
      ctx.strokeStyle=grad;
      ctx.lineWidth=1.2;
      ctx.beginPath();
      ctx.moveTo(x+prog*Math.cos(angle)-tailLen*Math.cos(angle),y+prog*Math.sin(angle)-tailLen*Math.sin(angle));
      ctx.lineTo(x+prog*Math.cos(angle),y+prog*Math.sin(angle));
      ctx.stroke();
      ctx.restore();
      requestAnimationFrame(frame);
    }
    frame();
  }
  setTimeout(shoot,1500);
})();

const BADGE_MAP={
  "지정학":"geo","전쟁":"war","분쟁":"war","무역":"eco","경제":"eco",
  "통화":"eco","금리":"eco","자원":"res","에너지":"res","광물":"res","외교":"geo"
};
function getBadgeClass(cat){
  for(const [k,v] of Object.entries(BADGE_MAP)){if(cat.includes(k))return v;}
  return "geo";
}

let newsLastFetched=null;
let newsCache=null;

async function fetchLiveNews(){
  const panel=document.getElementById("live-news-panel");
  const btn=document.getElementById("ln-refresh-btn");
  const status=document.getElementById("ln-status");

  // 브라우저 5분 캐시 (서버는 12시간 캐시로 별도 관리)
  if(newsCache&&newsLastFetched&&(Date.now()-newsLastFetched)<300000){
    renderNews(newsCache.items||newsCache);
    if(newsCache.fetchedAtKr) status.textContent=`${newsCache.fetchedAtKr} 기준`;
    return;
  }

  btn.disabled=true;
  btn.textContent="불러오는 중...";
  status.textContent="분석 중...";
  panel.innerHTML='<div class="ln-loading"><div class="spin"></div><br>최신 지정학 뉴스 분석 중...</div>';

  try{
    const res=await fetch("/api/news");
    if(!res.ok) throw new Error(`서버 오류 ${res.status}`);
    const data=await res.json();
    if(!data.items||!data.items.length) throw new Error("데이터 없음");

    newsCache=data;
    newsLastFetched=Date.now();
    renderNews(data.items);

    // 서버에서 받은 한국시간 기준 업데이트 정보 표시
    if(data.fetchedAtKr && data.nextUpdateKr){
      status.textContent=`${data.fetchedAtKr} 기준 · 다음: ${data.nextUpdateKr}`;
    } else {
      const d=new Date(newsLastFetched);
      status.textContent=`${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")} 업데이트`;
    }

  }catch(e){
    console.warn("Live news fetch failed, using fallback:", e.message);
    renderNews(NEWS_FALLBACK);
    status.textContent="오프라인 데이터 (12시간 주기 업데이트)";
  }finally{
    btn.disabled=false;
    btn.textContent="🔄 새로고침";
  }
}

function renderNews(items){
  const panel=document.getElementById("live-news-panel");
  panel.innerHTML="";
  items.forEach(n=>{
    const cat=n.category||n.badgeText||"지정학";
    const bCls=getBadgeClass(cat);
    const el=document.createElement("div");
    el.className="ln-item";
    el.innerHTML=`
      <div class="ln-date"><span>${n.date||""}</span><span class="ln-badge ${bCls}">${cat}</span></div>
      <div class="ln-title">${n.title||""}</div>
      <div class="ln-body">${n.body||""}</div>
      ${n.impact?`<div class="ln-impact">📌 ${n.impact}</div>`:""}
    `;
    panel.appendChild(el);
  });
}

      const allActive=["us","cn","swing"].every(x=>activeAligns.has(x));
      if(allActive){activeAligns.clear();}
      else{activeAligns=new Set(["all","us","cn","swing"]);}
    } else {
      if(activeAligns.has(a)){activeAligns.delete(a);}
      else{activeAligns.add(a);}
    }
    document.querySelectorAll(".f-btn[data-align]").forEach(b=>{
      b.classList.toggle("active",activeAligns.has(b.dataset.align)||activeAligns.has("all")||b.dataset.align==="all"&&["us","cn","swing"].every(x=>activeAligns.has(x)));
    });
    updateMarkers();
    updateConnVisibility();
  });
});
// ── 국가 데이터 하루 1회 자동 업데이트 ──
// 금리·정책·요약·watchlist·risk 등 동적 필드를 서버에서 재생성해 덮어씌움
// 지도 좌표·이름·국기 등 정적 필드는 index.html 하드코딩 유지

let countryUpdatesDate = null;

async function fetchCountryUpdates() {
  try {
    const res = await fetch("/api/country-updates");
    if (!res.ok) throw new Error(`서버 오류 ${res.status}`);
    const data = await res.json();
    if (!data.updates) return;

    countryUpdatesDate = data.fetchedAtKr || "";

    // COUNTRIES 배열의 동적 필드만 덮어씌우기
    const DYNAMIC_FIELDS = ["summary","keywords","geo","rate","policy","watchlist","risk"];
    COUNTRIES.forEach(c => {
      const u = data.updates[c.id];
      if (!u) return;
      DYNAMIC_FIELDS.forEach(field => {
        if (u[field] !== undefined) c[field] = u[field];
      });
    });

    // 연결선 관계 데이터도 업데이트 (note, watch, keyItems)
    if (data.connections) {
      CONNECTIONS.forEach(conn => {
        const key = `${conn.from}-${conn.to}`;
        const u = data.connections[key];
        if (!u || !conn.rel) return;
        if (u.note) conn.rel.note = u.note;
        if (u.watch) conn.rel.watch = u.watch;
        if (u.keyItems) conn.rel.keyItems = u.keyItems;
      });
    }

    // 이미 열린 국가 패널 있으면 새로고침 표시
    const openCountry = document.querySelector(".country-item.active");
    if (openCountry) {
      const banner = document.getElementById("update-banner");
      if (banner) {
        banner.style.display = "flex";
        banner.textContent = `🔄 ${countryUpdatesDate} 기준 데이터로 업데이트됨`;
      }
    }

    console.log(`[자산제곱] 국가 데이터 업데이트 완료: ${countryUpdatesDate}`);
  } catch (e) {
    console.warn("Country updates fetch failed (using static data):", e.message);
  }
}

// 페이지 로드 후 백그라운드에서 조용히 가져오기
// 로드 완료 후 2초 뒤 실행 (지구본 초기화 우선)
window.addEventListener("load", () => setTimeout(fetchCountryUpdates, 2000));

// ── 스크롤 인디케이터 ──
(function(){
  const sec = document.getElementById("country-section");
  const thumb = document.getElementById("scroll-thumb");
  const track = document.getElementById("scroll-track");
  const fade = document.getElementById("scroll-fade");
  if(!sec||!thumb||!track||!fade) return;

  function updateScroll(){
    const {scrollTop, scrollHeight, clientHeight} = sec;
    const ratio = clientHeight / scrollHeight;
    const thumbH = Math.max(30, track.clientHeight * ratio);
    const maxTop = track.clientHeight - thumbH;
    const top = (scrollTop / (scrollHeight - clientHeight)) * maxTop;
    thumb.style.height = thumbH + "px";
    thumb.style.top = (isNaN(top)?0:top) + "px";
    // 하단 페이드: 끝에 도달하면 숨김
    const atBottom = scrollTop + clientHeight >= scrollHeight - 4;
    fade.style.opacity = atBottom ? "0" : "1";
    // 스크롤바: 스크롤 가능할 때만 표시
    track.style.opacity = ratio >= 1 ? "0" : "1";
  }

  sec.addEventListener("scroll", updateScroll);
  // 국가 목록 렌더 후 업데이트
  setTimeout(updateScroll, 300);
  window.addEventListener("resize", updateScroll);
  // 탭 전환 시에도 업데이트
  document.querySelectorAll(".tab").forEach(t =>
    t.addEventListener("click", () => setTimeout(updateScroll, 50))
  );
})();

  de:"🕊️ <b>신성로마제국(962~1806)</b>: 중세 유럽의 핵심. 수백개 소국 분열 상태 수백년 지속.<br>🔫 <b>비스마르크 통일(1871)</b>: 프로이센이 독일 통일. 유럽 최강국 급부상. 이후 두 차례 세계대전의 씨앗.<br>☠️ <b>나치·홀로코스트(1933~45)</b>: 히틀러 집권. 유대인 600만명 학살. 전후 역사 반성이 현대 독일 외교의 기반.<br>🧱 <b>분단과 통일(1949~1990)</b>: 동서독 분단 41년. 베를린 장벽 붕괴(1989)로 통일. 막대한 동독 재건 비용.<br>🌍 <b>EU 주도(1990s~)</b>: 유로화 창설, EU 최대 경제국. '유럽의 기관차'. 그러나 지금은 탈산업화 위기.<br>⚡ <b>에너지 전환 딜레마</b>: 러 가스 의존 탈피 후 에너지 비용 폭등. 제조업 탈독일화 가속. '독일병' 진단.",
  ru:"🐻 <b>몽골 지배(1240~1480)</b>: 240년간 몽골 속국. 전제주의·고립주의 DNA 각인. 이후 유럽과 다른 발전 경로.<br>🏰 <b>로마노프 왕조(1613~1917)</b>: 제정 러시아. 나폴레옹·히틀러 격퇴. '동장군'이 러시아의 최강 무기.<br>🔴 <b>볼셰비키 혁명(1917)</b>: 레닌 주도 공산혁명. 소비에트 연방 수립. 세계 최초 사회주의 국가 실험.<br>🚀 <b>소련 패권(1945~91)</b>: 2차대전 승전국. 스푸트니크(1957) 우주경쟁. 핵무장. 미소 냉전 구도.<br>💔 <b>소련 붕괴(1991)</b>: 고르바초프 개혁으로 해체. 옐친의 혼란기. 1990년대 '잃어버린 10년'.<br>🪆 <b>푸틴 시대(2000~)</b>: 에너지 수출로 경제 재건. '강한 러시아' 부활 추진. 우크라이나 침공(2022)으로 서방과 최종 단절.",
  ua:"🌻 <b>고려공국(882~1240)</b>: 키예프 루스의 중심. 슬라브 문명의 발원지. 러시아·우크라이나의 공통 조상 분쟁 기원.<br>☭ <b>소련 편입(1922~91)</b>: 홀로도모르(1932~33) — 스탈린의 강제 집단화로 500~700만명 기아 사망. 우크라이나의 역사적 트라우마.<br>⚛️ <b>체르노빌(1986)</b>: 원전 폭발로 수백만 피폭. 소련 붕괴 촉진제. 체르노빌 주변 지금도 방사능 오염.<br>🔵🟡 <b>독립(1991)</b>: 소련 해체로 독립. 핵무기 자발 포기(부다페스트 각서) — 러시아의 영토 보전 보장 약속.<br>🌹 <b>오렌지혁명(2004)·마이단(2014)</b>: 친러 정권에 맞선 민주화. 2014년 러시아의 크림 합병. 내전 시작.<br>💥 <b>전면 침공(2022~)</b>: 러시아 전면 침공. 부다페스트 각서 위반. '핵 포기의 비극'으로 기록.",
  ir:"🏺 <b>페르시아 제국(550~330BC)</b>: 인류 최초 대제국. 다리우스 대왕. 이후 알렉산더 대왕에 정복. 문명의 원류.<br>☪️ <b>이슬람 정복(651~)</b>: 아랍 이슬람 세력에 정복. 페르시아 문화+이슬람 융합. 시아파 중심지 형성.<br>⚫ <b>석유 발견(1908)</b>: 영국이 최초 발견·채굴. 앵글로-페르시아 오일(BP 전신) 설립. 자원 약탈의 시작.<br>🇺🇸 <b>모사데그 쿠데타(1953)</b>: 석유 국유화 시도한 민주 총리 CIA·MI6 공작으로 축출. 이란의 반미 감정 원점.<br>⚡ <b>이슬람 혁명(1979)</b>: 호메이니 주도. 팔레비 왕정 타도. '미국 대사관 인질(444일)'. 미국과 단교 이후 지금까지 적대.<br>☢️ <b>이란-이라크 전쟁(1980~88)</b>: 이라크(사담+미국 지원)의 침공. 100만명 사망. 화학무기 사용. '잊혀진 전쟁'.",
  sa:"🏜️ <b>이슬람 발원지</b>: 메카·메디나 소재. 무함마드 탄생지. 전 세계 18억 무슬림의 정신적 중심.<br>⚔️ <b>사우드 가문 통일(1932)</b>: 이부 사우드가 아라비아 반도 통일. 사우디아라비아 왕국 수립. 석유 발견(1938)으로 운명 전환.<br>🛢️ <b>아람코 설립(1944)</b>: 미국 석유 기업과 합작. 이후 국유화(1976). 세계 최대 석유 기업으로 성장.<br>🤝 <b>페트로달러 협약(1974)</b>: 원유 달러 결제 독점 합의. 미국 안보 보장 대가. 달러 패권의 물리적 기반 완성.<br>👑 <b>MBS 집권(2017~)</b>: 무함마드 빈 살만 실권 장악. 자말 카슈끄지 암살(2018). 비전2030 주도. 권위주의+근대화 병행.<br>🏗️ <b>비전2030</b>: 석유 의존 탈피 시도. 네옴 스마트시티, 관광·엔터테인먼트 개방. 여성 운전 허용. 사회 변화 가속.",
  tw:"🏝️ <b>청나라 할양(1895)</b>: 청일전쟁 패배로 일본에 할양. 50년 일제 지배. 인프라 건설 병행.<br>🔵 <b>국민당 이전(1949)</b>: 공산당에 패한 장제스가 200만 군민을 이끌고 대만으로 피난. '자유중국' 수립.<br>🐉 <b>경제 기적(1960~90s)</b>: '네 마리 용' 중 하나. 수출 주도 성장. 민주화(1996년 직선제) 달성.<br>💻 <b>TSMC 설립(1987)</b>: 모리스 창이 창립. 파운드리 전문 기업 최초. 이후 반도체 역사 바꿈.<br>🔬 <b>반도체 패권(2000s~)</b>: TSMC가 2나노 독점. AI 시대의 핵심 인프라. '실리콘 방패(Silicon Shield)' = 미국이 대만을 포기 못하는 이유.<br>🗳️ <b>현재 딜레마</b>: 독립 선언 시 중국 침공. 통일 수용 시 홍콩화. '현상 유지'만이 유일한 선택지.",
  in:"🕌 <b>무굴 제국(1526~1857)</b>: 이슬람 왕조가 힌두 다수 지배. 타지마할 건설. 인도 다원성의 역사적 기반.<br>🇬🇧 <b>영국 식민지(1858~1947)</b>: 동인도회사→영국 직접 지배. 철도 인프라 구축. 영어 공용어화 — 현재 IT 강국의 씨앗.<br>🕊️ <b>간디·비폭력 독립(1947)</b>: 종교 분리로 인도-파키스탄 분리 독립. 힌두교-이슬람 충돌로 100만명 사망.<br>🔴 <b>비동맹 운동</b>: 냉전 시 미소 양측 거부. 독자 노선. 2026년 대미·대중 동시 줄타기의 DNA.<br>💚 <b>녹색혁명(1960~70s)</b>: 식량 자급 달성. 이전엔 기근 반복. 농업 강국 기반.<br>🖥️ <b>IT 강국 부상(1990s~)</b>: 이공계 인재+영어+저임금 3박자. 실리콘밸리 인도인 네트워크. '두뇌 수출'에서 '두뇌 귀환'으로.",
  br:"🌊 <b>포르투갈 식민지(1500~1822)</b>: 카브랄 도착. 원주민 학살·노예 노동. 포르투갈어와 가톨릭 문화 이식.<br>👑 <b>독립 제국(1822~1889)</b>: 포르투갈 왕자 페드루가 황제로 독립 선언. 남미 유일 왕국. 노예제 1888년까지 지속.<br>🌿 <b>커피·고무 붐(19c말~20c초)</b>: '커피 공화국'. 상파울루 이민 붐. 일본계 이민 세계 최다(현재 200만명).<br>🏭 <b>바르가스 산업화(1930~50s)</b>: 국가 주도 철강·자동차·에너지 산업 건설. '브라질 국가 자본주의'의 원형.<br>⚽ <b>1964~85 군사 독재</b>: 쿠데타. '브라질 기적(1968~73)'으로 고성장. 민정 이양 후 하이퍼인플레이션 30년.<br>🔴 <b>룰라·볼소나루·룰라(2003~)</b>: 좌우 진자 운동. 빈곤 감소 vs 환경 파괴. 2026년 현재 3기 룰라가 재정 지출 확대.",
  cl:"🗡️ <b>잉카 문명·스페인 정복(1540)</b>: 피사로의 정복. 원주민 노동력으로 은광 개발. 라틴아메리카 식민지 경제 원형.<br>⚔️ <b>독립(1818)</b>: 산 마르틴·오히긴스 주도 독립. 이후 안정적 공화제 유지 — 중남미에서 드문 케이스.<br>🧂 <b>초석(질산염) 전쟁(1879~84)</b>: 볼리비아·페루와 전쟁, 아타카마 사막 획득. 초석→구리→리튬으로 자원 교체.<br>✊ <b>아옌데·피노체트(1970~90)</b>: 세계 최초 민주선거 사회주의. 미국 지원 쿠데타(1973). 피노체트 신자유주의 실험. 경제 성장+인권 탄압.<br>🍇 <b>민주화(1990~)</b>: 군정 종식. 안정적 민주주의+자유시장 결합. '남미의 우등생'. 그러나 불평등 심화로 2019년 대규모 시위.<br>⛏️ <b>리튬 국유화 논쟁(2023~)</b>: 보리치 정부의 리튬 국유화 시도. 외국 투자 vs 국가 통제 딜레마. 현재 공기업+민간 혼합 방식.",
  ng:"🏺 <b>선진 왕국들</b>: 요루바·이그보·하우사 등 다양한 왕국. 이페·베냉 왕국의 정교한 청동 예술.<br>⛓️ <b>노예 무역(17~19c)</b>: 영국의 서아프리카 노예 공급지. 추정 1,000만명 아메리카 이송. '노예 해안'이라 불린 비극.<br>🇬🇧 <b>영국 식민지(1914~1960)</b>: 서로 다른 300개 부족을 하나의 '나이지리아'로 통합. 부족·종교 갈등의 씨앗.<br>🛢️ <b>석유 발견(1956)·독립(1960)</b>: 석유 발견 4년 후 독립. '자원의 저주' 시작. 석유 수입은 소수 엘리트에 집중.<br>💀 <b>비아프라 내전(1967~70)</b>: 이그보족 분리 독립 시도. 내전으로 100만~300만 사망. 현재도 분리주의 잠복.<br>📱 <b>핀테크 붐(2010s~)</b>: 인구 2억의 모바일 금융 혁명. Flutterwave·Paystack. '아프리카의 실리콘밸리'",
  cd:"💎 <b>콩고 자유국(1885~1908)</b>: 벨기에 레오폴드 2세 개인 소유. 고무 채취 할당량 미달 시 손 절단. 1,000만명 학살 — 인류 역사 최악의 식민 착취.<br>⚒️ <b>벨기에 식민지(1908~60)</b>: 코발트·구리·다이아몬드 채굴. 인프라는 채굴 위해서만 건설. 교육 방치.<br>🔫 <b>루뭄바 암살(1961)</b>: 독립 초대 총리 루뭄바 CIA·벨기에 공작으로 암살. 모부투 30년 독재 시작.<br>💔 <b>콩고 전쟁(1996~2003)</b>: 르완다 집단학살 여파. 6개국 개입, 500만명 이상 사망. '아프리카 세계대전'.<br>⛏️ <b>광물 전쟁 현재</b>: 동부 광산지대에서 100개 이상 무장 세력이 코발트·콜탄 채굴 통제. 아동 노동 만연.<br>🔋 <b>배터리 전쟁(2020s~)</b>: 전기차 혁명으로 코발트 수요 폭발. 중국 기업 장악 → 서방의 탈중국 공급망 구축 전쟁.",
  kp:"🏯 <b>조선 왕조 공유 역사</b>: 한반도 분단 전까지 단일 역사. 고조선~삼국~고려~조선 공유.<br>☭ <b>소련 점령(1945~48)</b>: 2차대전 후 38선 이북 소련 점령. 김일성 소련 훈련받은 빨치산 출신으로 낙하산 집권.<br>🔥 <b>6.25 전쟁(1950~53)</b>: 김일성의 남침으로 시작. 중국 개입. 300만명 사망. 정전협정으로 현재까지 분단 지속.<br>💀 <b>주체사상·세습 독재</b>: 김일성→김정일→김정은 3대 세습. 사회주의권 유일한 왕조적 세습. 1990년대 대기근 300만명 아사 추정.<br>☢️ <b>핵 개발(2006~)</b>: 1차 핵실험부터 현재까지 고도화. ICBM·잠수함 발사 미사일. '핵 포기 불가' 노선 확정.<br>🪖 <b>러시아 파병(2024~)</b>: 우크라이나 전선에 병력 파견. 실전 경험+러시아 첨단 기술 획득. 한반도 위협 증대.",
  gb:"⚓ <b>대영제국(1600~1947)</b>: '해가 지지 않는 제국'. 전 세계 영토의 25% 지배. 산업혁명 원산지. 현재 56개국 영연방 기원.<br>📜 <b>민주주의 원점</b>: 마그나카르타(1215)→권리장전(1689)→의회민주주의. 현대 민주주의의 실험실.<br>🔧 <b>산업혁명(1760~1840)</b>: 증기기관·방직기·철도. 자본주의 시스템 확립. 지금의 세계 경제질서 기원.<br>🌍 <b>2차대전 서방 수호(1940)</b>: 나치 최전선 방어. 처칠의 '결코 항복하지 않겠다'. 영미 특수 관계 기원.<br>💸 <b>브렉시트(2016~20)</b>: EU 탈퇴 국민투표 51.9% 찬성. 이후 무역 감소·금융 위축. '대영제국의 향수'가 낳은 역사적 도박.<br>🤝 <b>미영 특수 관계</b>: AUKUS·Five Eyes·나토 핵심. 트럼프도 영국과는 우선 무역 협정. 브렉시트 이후 미국 의존 심화.",
  au:"🦘 <b>원주민(6만년 역사)</b>: 세계에서 가장 오래된 문화. 애버리진 6만년 거주. 영국 정착 이후 급격한 인구 감소.<br>⛓️ <b>영국 죄수 식민지(1788~)</b>: 영국 감옥 과부하로 호주를 유배지로 활용. 이후 골드러시로 이민 급증.<br>⛏️ <b>골드러시(1851)</b>: 금 발견으로 인구 폭발. 다양한 이민 유입. 중국인 이민도 이때 시작.<br>🌏 <b>백호주의(1901~73)</b>: 아시아계 이민 금지 정책. 유럽계 이민 우대. 1973년 폐지 후 아시아계 급증.<br>🤝 <b>미호 동맹(1951~)</b>: ANZUS 조약으로 미국 안보 우산. 베트남·이라크·아프간 전쟁 미국과 동반 참전.<br>🪨 <b>자원 붐(2000s~)</b>: 중국의 원자재 수요 폭발로 '자원 붐'. GDP 성장. 이제 중국 의존 탈피+AUKUS로 전환.",
  fr:"⚜️ <b>절대왕정(17c)</b>: 태양왕 루이 14세. 베르사유 궁전. 유럽 최강국. 프랑스어=유럽 외교 언어.<br>🔴 <b>프랑스 혁명(1789)</b>: 자유·평등·박애. 앙시앵레짐 타도. 인권선언. 현대 민주주의·공화주의의 원점.<br>🎯 <b>나폴레옹(1799~1815)</b>: 혁명 정신을 유럽 전파+정복. 나폴레옹 법전. 러시아 원정 실패로 몰락. 민족주의 각성.<br>🏭 <b>식민지 제국</b>: 아프리카(알제리·말리·세네갈)·동남아(베트남)·태평양 광대한 제국. 현재도 13개국과 CFA프랑(식민지 화폐) 유지.<br>🌍 <b>EU 주도(1950s~)</b>: 독불 화해로 유럽 통합 출발. 드골의 '독자적 유럽' 비전. NATO에도 거리 두기.<br>🔥 <b>사헬 철수(2022~23)</b>: 말리·니제르 반프랑스 쿠데타로 군대 철수. 아프리카 영향력 급감. 러시아 바그너 진공 메움.",
  tr:"🏛️ <b>비잔틴→오스만 제국(1453~1922)</b>: 콘스탄티노플 정복. 600년 이슬람 제국. 세 대륙 지배. 아라비아·발칸·북아프리카.<br>🌙 <b>제국 붕괴(1918~22)</b>: 1차대전 패배. '병자 오스만'. 아르메니아 학살 논란. 케말 아타튀르크의 현대화 혁명.<br>🇹🇷 <b>아타튀르크 세속화(1923~)</b>: 정교분리·로마자·여성 참정권. 이슬람 국가에서 세속 공화국으로. 군부가 세속주의 수호자.<br>🤝 <b>NATO 가입(1952)</b>: 냉전 시 소련 견제 위해 가입. 두 번째로 큰 군사력. 그러나 S-400 구매로 미국과 갈등.<br>🔑 <b>보스포루스 통제</b>: 흑해~지중해 연결 해협 독점. 우크라이나 전쟁 중 중립 유지하며 협상 중재.<br>🌐 <b>에르도안 시대(2003~)</b>: 이슬람 보수주의+권위주의 강화. 쿠르드 탄압. NATO와 갈등. '네오오스만주의' 표방.",
  il:"📜 <b>성경의 땅</b>: 유대교·기독교·이슬람 3대 종교의 성지. 예루살렘을 둘러싼 종교 갈등 3,000년 역사.<br>⭐ <b>시온주의·이스라엘 건국(1948)</b>: 홀로코스트 이후 유대인 국가 수립. 아랍 국가 5개국 즉각 침공. 1차 중동전쟁.<br>⚔️ <b>중동 전쟁들(1956·67·73)</b>: 수에즈 위기·6일 전쟁(영토 3배 확장)·욤키푸르 전쟁. 매번 생존 위기.<br>✌️ <b>오슬로 협정(1993)</b>: 라빈-아라파트 악수. 팔레스타인 자치권 인정. 이후 라빈 암살·협정 붕괴.<br>💻 <b>스타트업 네이션</b>: 인구 900만에 유니콘 기업 수십개. 사이버보안·농업기술·의료기술 세계 선도. 'Start-Up Nation(2009)'.<br>🔥 <b>가자 전쟁(2023~)</b>: 하마스의 10.7 기습. 1,200명 학살. 이스라엘 가자 반격. 국제 고립+안보 딜레마.",
  pk:"🏺 <b>인더스 문명(3000BC)</b>: 세계 4대 문명 중 하나. 모헨조다로·하라파. 현재 파키스탄 영토.<br>🕌 <b>무굴 제국(1526~1857)</b>: 이슬람 왕조가 인도 지배. 타지마할. 인도-파키스탄 분리의 역사적 뿌리.<br>🇬🇧 <b>영국 식민지~분리 독립(1947)</b>: 힌두(인도)·이슬람(파키스탄) 분리. 100만명 학살·1,000만명 이주. '분리 독립의 비극'.<br>☢️ <b>핵 개발(1998)</b>: '이슬람 핵폭탄'. 인도 핵실험에 2주 만에 맞대응. 카슈미르 분쟁+핵 대치가 현재진행형.<br>🪖 <b>군부 지배 사이클</b>: 독립 이후 군사 쿠데타 반복. '군부가 국가를 소유한 나라'. 민정과 군정 교대.<br>🏗️ <b>CPEC(2015~)</b>: 중국 $620억 투자. 과다르 항구~신장 연결. 중국의 인도양 진출+파키스탄 종속 심화.",
  vn:"🐉 <b>중국 1,000년 지배(111BC~938AD)</b>: '북방 귀신' vs '남방 오랑캐'. 독립 후에도 중국 문화 깊이 흡수. 현재 대중 경계심 유지.<br>🗡️ <b>프랑스 식민지(1858~1954)</b>: 인도차이나 연방. 커피·고무 플랜테이션. 호치민 공산주의 독립운동.<br>🔥 <b>베트남 전쟁(1955~75)</b>: 미국의 '도미노 이론'. 58,000명 미군 사망. 고엽제. 공산 통일(1975). 베트남전이 미국 대외 개입 트라우마 형성.<br>🌱 <b>도이머이 개혁(1986)</b>: '새 변화'. 시장경제 도입. 이후 연 6~7% 성장. 중국 개혁개방 모델 참조.<br>🤝 <b>미-베트남 정상화(1995)</b>: 전쟁 20년 후 수교. 2023년 포괄적 전략 파트너십. 미국의 대중 견제 파트너.<br>📱 <b>차이나+1 허브</b>: 삼성 최대 수출국. 중국 공장 이전 1순위. 그러나 대미 흑자 폭증으로 관세 압박.",
  id:"🌴 <b>향신료 제국(15~17c)</b>: 육두구·정향·후추 독점. 네덜란드 동인도회사의 타겟. 세계 무역의 핵심 교점.<br>🇳🇱 <b>네덜란드 식민지(350년)</b>: 착취적 강제 재배 시스템. 인프라는 자원 수출 위주. 독립 운동 탄압.<br>🌾 <b>수카르노 독립(1945~65)</b>: '비동맹 운동' 창시자. 그러나 경제 실패·공산당 쿠데타 시도로 몰락.<br>⚔️ <b>수하르토 학살(1965~66)</b>: 50만명 학살(추정). 반공산당 숙청. 이후 30년 개발독재. 경제 성장+부패.<br>💔 <b>아시아 금융위기(1997~98)</b>: IMF 구제금융. 루피아 85% 폭락. 민주화 혁명으로 수하르토 퇴진.<br>🌐 <b>민주화~현재</b>: 세계 3위 민주주의 인구. 프라보워 신정부(2024~). G20 멤버. 니켈 하류산업화로 자원 주권 강화.",
  mx:"🦅 <b>아즈텍·마야 문명</b>: 테노치티틀란(현 멕시코시티). 태양력·피라미드·초콜릿·옥수수의 원산지.<br>⚔️ <b>스페인 정복(1519~1521)</b>: 코르테스 500명으로 아즈텍 제국 정복. 천연두+총기의 콤비. 원주민 90% 사망.<br>🔴 <b>멕시코 혁명(1910~20)</b>: 디아스 독재 타도. 사파타·비야의 농민 혁명. 세계 최초 사회권 헌법 제정.<br>🤝 <b>NAFTA(1994~)</b>: 미국·캐나다와 자유무역. 제조업 허브 도약. 그러나 자국 농업 붕괴·마약 카르텔 성장 부작용.<br>🌽 <b>사파티스타(1994)</b>: NAFTA 발효일에 원주민 봉기. 세계화 반대의 상징. 치아파스 자치 지역 현재까지 유지.<br>🏭 <b>니어쇼어링(2020s~)</b>: 코로나+미중 갈등으로 공급망 재편. 테슬라·BMW·삼성 공장 유치. '신 제조업 허브'",
  pl:"🦅 <b>폴란드-리투아니아 연방(1385~1795)</b>: 한때 유럽 최대 국가. 종교적 관용으로 유대인 피난처.<br>💔 <b>3차 분할·소멸(1772~1918)</b>: 러시아·프로이센·오스트리아에 분할. 123년간 국가 소멸. 민족 정체성은 유지.<br>☠️ <b>2차대전 최대 피해국</b>: 인구의 17%(600만명) 사망. 아우슈비츠 소재지. 유대인 홀로코스트 중심지.<br>✊ <b>연대노조(1980)</b>: 레흐 바웬사의 노동자 운동. 동유럽 공산 붕괴의 시작. 1989년 자유선거 최초.<br>🇪🇺 <b>EU 가입(2004)</b>: 서방 편입. 독일 공장 이전 수혜. 연 5~6% 성장 20년. '폴란드 기적'.<br>🛡️ <b>NATO 최전선(2022~)</b>: 우크라이나 전쟁으로 러시아 직접 위협. 방위비 GDP 4% 세계 1위. 한국 방산 최대 고객.",
  za:"🦁 <b>네덜란드·영국 식민지(1652~1910)</b>: 케이프타운 설립. 영국과 보어 전쟁(최초의 집단 수용소). 다이아몬드·금 발견으로 영국 본격 침략.<br>😔 <b>아파르트헤이트(1948~1994)</b>: 인종분리 체제. 흑인 82% 인구가 13% 영토에 격리. 국제 제재. 넬슨 만델라 27년 감옥.<br>🕊️ <b>만델라 석방(1990)·민주화(1994)</b>: ANC 집권. '무지개 나라' 비전. 진실화해위원회. 세계 역사상 가장 평화로운 정권 이양 중 하나.<br>⚡ <b>에스콤 위기(2007~)</b>: 발전 용량 부족으로 계획 정전(로드쉐딩). GDP 연 2% 손실. 산업 경쟁력 치명타.<br>🏳️ <b>현재 연정 정치</b>: ANC 과반 상실. GNU(국민단결정부) 수립. 민주동맹 포함 다당 연정. 정치 불확실성 증가.<br>⛏️ <b>광물 강국</b>: 팔라듐·백금·크롬·망간·금·다이아몬드. '지질학적 보물창고'. 에너지 위기 해결이 선결 과제.",
  eg:"🏺 <b>파라오 문명(3100BC~)</b>: 인류 최고 수준 고대 문명. 피라미드·스핑크스. 나일강이 문명의 젖줄.<br>🌙 <b>이슬람 정복(642AD~)</b>: 아랍 이슬람에 정복. 콥트 기독교 소수파 유지. 이후 오스만 제국 속국.<br>⚓ <b>수에즈 운하(1869)</b>: 영국·프랑스 자본으로 건설. 영국 지배 계기. 1956년 나세르 국유화→수에즈 위기.<br>✊ <b>나세르·아랍 민족주의(1956~70)</b>: 수에즈 국유화. 소련 지원. 아랍 통일 시도. 6일 전쟁 패배로 좌절.<br>🤝 <b>사다트·캠프데이비드(1978)</b>: 이스라엘과 평화협정. 아랍 진영에서 고립. 사다트 암살(1981).<br>🌹 <b>아랍의 봄(2011)</b>: 무바라크 30년 독재 타도. 무슬림형제단 집권. 군부 쿠데타(2013)로 엘시시 독재 재건.",
  ar:"🌊 <b>스페인 식민지(1516~1816)</b>: 라플라타 부왕령. 은·가죽·곡물 수출. 부에노스아이레스 항구 중심.<br>⚔️ <b>독립(1816)·이민 붐</b>: 스페인서 독립. 19~20세기 유럽(이탈리아·스페인·독일) 이민 2,000만명. 남미에서 가장 유럽적인 나라.<br>🏭 <b>페론주의(1946~55)</b>: 후안 페론의 노동자·국가주의 포퓰리즘. '페론주의'가 아르헨티나 정치 DNA. 이후 군사 쿠데타 반복.<br>💔 <b>더러운 전쟁(1976~83)</b>: 군사 독재. 30,000명 실종·살해. 어머니광장 시위. 포클랜드 전쟁 패배로 민주화.<br>📉 <b>2001~02 디폴트</b>: '코랄리토'(계좌 동결). 대통령 5명 2주에 교체. IMF 채무 최대. 페소 평가절하 70%.<br>🪓 <b>밀레이 충격요법(2023~)</b>: 극우 자유주의. 보조금 전면 삭감·국영기업 민영화. 전기톱으로 국가 기관 상징 퍼포먼스. 인플레 하락 중.",
  ca:"🍁 <b>원주민+프랑스·영국 식민(1534~)</b>: 퀘벡(프랑스계)과 나머지(영국계) 이중 문화. 퀘벡 독립 운동 반복.<br>🤠 <b>미국과 공유 역사</b>: 1812년 전쟁에서 영국 캐나다가 미국 침공 격퇴. 백악관 방화. '미국이 캐나다를 침공한 유일한 역사'.<br>⛏️ <b>골드러시·자원 경제</b>: 클론다이크 골드러시(1896). 20세기 석유(앨버타)·밀·목재 자원 강국.<br>🕊️ <b>다문화주의(1971~)</b>: 공식 다문화주의 정책. 세계에서 가장 많은 비율의 이민자 수용. 인종 갈등 상대적으로 낮음.<br>🤝 <b>NAFTA·USMCA</b>: 미국 경제에 75% 의존. 무역 다각화 시도에도 구조적 의존 탈피 어려움.<br>🫠 <b>트럼프 '51번째 주'(2025~)</b>: 극단적 관세 위협과 병합 농담. 캐나다 전통 친미 기조 훼손. 탈미 외교 모색 중.",
  my:"🚢 <b>말라카 왕국(1400~1511)</b>: 동서 무역 핵심 허브. 이슬람 전파 거점. 포르투갈에 정복 = 향신료 무역 독점 상실.<br>🌴 <b>영국 식민지(1824~1957)</b>: 말레이·중국·인도 3민족 이민 정책. 현재 다민족 사회의 기원. 고무·주석 채굴.<br>🗡️ <b>말레이 독립(1957)</b>: 코먼웰스 내 독립. 싱가포르 분리(1965). 부미푸트라(말레이 우대) 정책 도입.<br>⚡ <b>마하티르 산업화(1981~2003)</b>: 룩 이스트(한국·일본 모델). 자동차·전자 산업 육성. '아시아의 호랑이'.<br>📉 <b>아시아 금융위기(1997~98)</b>: IMF 거부·자본통제 독자 대응. 링깃 고정. 단기적 성공으로 '마하티르 이단'.<br>💻 <b>반도체 허브(2010s~)</b>: 차이나+1 수혜. 인텔·인피니온·ST마이크로 패키징 집적. AI 시대 패키징 수요 급증.",
  sg:"🏝️ <b>말라카 해협 전략 위치</b>: 1819년 래플스가 영국 무역항으로 개발. 위치가 곧 운명.<br>🇬🇧 <b>영국 왕관 식민지</b>: 아시아 영국 제국의 핵심. 2차대전 일본군에 함락. 처칠의 '동방 지브롤터 함락' — 영국 제국 종말의 상징.<br>😢 <b>말레이시아 분리(1965)</b>: 말레이 vs 중국계 갈등으로 강제 분리. 이광요 대성(大聲)으로 눈물 발표.<br>🦁 <b>이광요의 기적(1965~2015)</b>: 자원 없는 도시국가가 50년 만에 아시아 1위 1인당 GDP. 권위주의적 효율성 모델.<br>🌐 <b>중립 허브 전략</b>: 미중 모두와 좋은 관계. 중국 자본의 서방 투자 우회 통로. 러시아 자금도 경유. '전략적 무관련성'.<br>💼 <b>가족오피스 허브</b>: 2020년 이후 중국 부호 자산 대거 이전. 관리 자산 $4조+. 아시아 최대 금융 중심지.",
  ae:"🏜️ <b>사막의 진주조개 어부</b>: 20세기 중반까지 진주 채취로 생활. 석유 발견(1950s) 전 세계 최빈국 수준.<br>🛢️ <b>석유 발견·독립(1971)</b>: 아부다비·두바이 등 7개 토후국 연합 UAE 독립. 석유 수입으로 초고속 현대화.<br>✈️ <b>두바이 모델(1990s~)</b>: 석유 없는 두바이가 항공·물류·금융 허브로 도약. '사막의 기적'. 에미레이트 항공·제벨알리 항구.<br>🌐 <b>아브라함 협정(2020)</b>: 트럼프 중재로 이스라엘과 수교. 아랍 최초 공식 정상화. 중동 질서 재편 신호.<br>🏗️ <b>엑스포 2020·비전 2071</b>: 100주년 비전. AI·우주·청정에너지. 화성 탐사 성공(Hope Probe).<br>💰 <b>글로벌 자금 허브</b>: 러시아·중국 제재 우회 자금, 글로벌 초부유층 자산 집결. BRICS+ 옵서버 참여.",
  th:"🐘 <b>수코타이·아유타야 왕국</b>: 동남아 불교 문명 중심. 아유타야는 버마에 멸망(1767). 방콕 천도.<br>🌏 <b>유일한 비식민지 국가</b>: 동남아에서 유일하게 서양 식민지가 안 된 나라. 영국·프랑스 사이 완충 외교.<br>🌾 <b>쌀 수출 강국</b>: '아시아의 빵바구니'. 세계 2위 쌀 수출국. 태국 쌀='자스민 라이스' 고급 브랜드.<br>🏭 <b>자동차 허브(1980s~)</b>: 일본 자동차 기업 거점. '동양의 디트로이트'. 현재 중국 EV로 전환 중.<br>🪖 <b>쿠데타 반복(20회+)</b>: 세계에서 가장 많은 군사 쿠데타 국가. 군부·왕실·민주주의 3각 갈등.<br>💛 <b>왕실 위기</b>: 국왕 교체(2016). 마하 와치랄롱꼰 현 국왕의 스캔들. 왕실 신성모독죄(3~15년)으로 비판 봉쇄.",
};
function selectCountry(c){
  document.querySelectorAll(".country-item").forEach(el=>el.classList.remove("active"));
  const li=document.querySelector(`.country-item[data-id="${c.id}"]`);
  if(li)li.classList.add("active");

  const rateTrendIcon={hawk:"▲ 인상 기조",dove:"▼ 인하 기조",hold:"― 동결"};
  const rateTrendCls={hawk:"rate-arrow hawk",dove:"rate-arrow dove",hold:"rate-arrow hold"};
  const st=STATS[c.id]||null;

  const dw=document.getElementById("detail-wrap");
  dw.classList.add("show");
  dw.innerHTML=`
    <div class="d-hero">
      <div class="d-flag">${c.flag}</div>
      <div class="d-meta">
        <div class="d-name">${c.name}</div>
        <div class="d-sub">
          <span>${c.region}</span>
          <span class="d-align" style="background:${ALIGN_BG[c.align]};color:${ALIGN_C[c.align]}">${ALIGN_N[c.align]} · ${c.alignLabel}</span>
        </div>
      </div>
      <button class="d-close">✕</button>
    </div>

    <div class="d-summary">${c.summary}</div>
    ${countryUpdatesDate ? `<div id="update-banner" style="display:none;padding:5px 13px;font-size:9px;color:var(--blue);background:rgba(255,255,255,.06);border-bottom:1px solid var(--border2);align-items:center;gap:4px;"></div>
    <div style="padding:4px 13px 0;font-size:8.5px;color:var(--muted2);">🔄 ${countryUpdatesDate} 기준 업데이트</div>` : ''}

    <!-- 핵심 키워드 -->
    <div class="d-section">
      <div class="d-section-title yellow">🔑 핵심 키워드</div>
      <div class="tag-cloud">${c.keywords.map(k=>`<span class="tag key">${k}</span>`).join("")}</div>
    </div>

    ${st?`
    <!-- 경제 지표 -->
    <div class="d-section">
      <div class="d-section-title blue">📈 경제 지표 (2026)</div>
      <div class="econ-grid">
        <div class="econ-card"><div class="econ-label">GDP 규모</div><div class="econ-val">${st.gdp}</div></div>
        <div class="econ-card"><div class="econ-label">성장률</div><div class="econ-val" style="color:${st.gdpGrowth.startsWith('-')?'var(--red)':'var(--green)'}">${st.gdpGrowth}</div></div>
        <div class="econ-card"><div class="econ-label">인구</div><div class="econ-val">${st.population}</div></div>
        <div class="econ-card"><div class="econ-label">인플레</div><div class="econ-val">${st.inflation}</div></div>
        <div class="econ-card"><div class="econ-label">국가부채</div><div class="econ-val">${st.debt}</div></div>
        <div class="econ-card"><div class="econ-label">통화</div><div class="econ-val">${st.currency}</div></div>
        <div class="econ-card econ-wide"><div class="econ-label">수출 규모</div><div class="econ-val">${st.exports}</div></div>
        <div class="econ-card econ-wide"><div class="econ-label">주요 교역국</div><div class="econ-val" style="font-size:10px;">${st.mainPartner}</div></div>
        ${st.stockIndex?`<div class="econ-card econ-full"><div class="econ-label">주가 지수</div><div class="econ-val">${st.stockIndex}</div></div>`:''}
      </div>
      <div class="econ-context">${st.context}</div>
    </div>
    `:''}

    <!-- 금리·통화정책 -->
    <div class="d-section">
      <div class="d-section-title blue">🏦 금리 · 통화정책</div>
      <div class="rate-card">
        <div class="rate-top">
          <span class="rate-name">${c.rate.name}</span>
          <span class="rate-val" style="color:${c.rate.trend==='hawk'?'var(--red)':c.rate.trend==='dove'?'var(--blue)':'var(--yellow)'}">${c.rate.val}</span>
        </div>
        <div class="rate-meta">${c.rate.note}</div>
        <div class="rate-trend"><span class="${rateTrendCls[c.rate.trend]}">${rateTrendIcon[c.rate.trend]}</span><span style="font-size:9px;color:var(--muted);margin-left:4px;">${c.rate.trendLabel}</span></div>
      </div>
    </div>

    <!-- 주요 정책 -->
    <div class="d-section">
      <div class="d-section-title green">🏛️ 주요 정책 · 전략</div>
      ${c.policy.map(p=>`<div class="policy-item"><div class="policy-bullet"></div><div class="policy-text">${p.text}</div></div>`).join("")}
    </div>

    <!-- 지정학 이슈 -->
    <div class="d-section">
      <div class="d-section-title geo">📍 지정학 이슈</div>
      <div class="tag-cloud">${c.geo.map(t=>`<span class="tag geo">${t}</span>`).join("")}</div>
    </div>

    <!-- 자원 -->
    <div class="d-section">
      <div class="d-section-title res">⛏️ 보유 자원 · 강점</div>
      <div class="tag-cloud">${c.resources.map(t=>`<span class="tag res">${t}</span>`).join("")}</div>
    </div>

    <!-- 핵심 산업 -->
    <div class="d-section">
      <div class="d-section-title blue">🏭 핵심 산업 · 기업</div>
      <div class="tag-cloud">${c.industry.map(t=>`<span class="tag ind">${t}</span>`).join("")}</div>
    </div>

    <!-- 투자자 주목 포인트 -->
    <div class="d-section">
      <div class="d-section-title yellow">👁️ 투자자 주목 포인트</div>
      ${c.watchlist.map(w=>`<div class="watch-item"><div class="watch-icon">${w.icon}</div><div class="watch-text">${w.text}</div></div>`).join("")}
    </div>

    <!-- 투자 리스크 -->
    <div class="d-section" style="border-bottom:none;">
      <div class="d-section-title red">⚠️ 투자 리스크</div>
      <div class="tag-cloud">${c.risk.map(t=>`<span class="tag risk">${t}</span>`).join("")}</div>
    </div>

    ${RESOURCES_INFO[c.id]?`
    <!-- 자원 중요도 -->
    <div class="d-section">
      <div class="d-section-title res">🔬 핵심 자원 — 왜 중요한가</div>
      ${RESOURCES_INFO[c.id].items.map(r=>`
        <div class="res-item">
          <div class="res-name">${r.name}</div>
          <div class="res-why">${r.why}</div>
          <div class="res-invest">📌 투자 포인트: ${r.invest}</div>
        </div>
      `).join("")}
      <div class="res-note">${RESOURCES_INFO[c.id].note}</div>
    </div>
    `:''}

    ${HISTORY[c.id]?`
    <!-- 역사적 배경 -->
    <div class="d-section" style="border-bottom:none;">
      <div class="d-section-title yellow">📖 역사적 배경 — 지정학의 뿌리</div>
      <div class="hist-body">${HISTORY[c.id]}</div>
    </div>
    `:''}
  `;

  dw.querySelector(".d-close").addEventListener("click",()=>{
    dw.classList.remove("show");
    dw.innerHTML='<div class="d-empty">지도에서 마커를 클릭하거나<br>국가 목록에서 선택하세요</div>';
    document.querySelectorAll(".country-item").forEach(el=>el.classList.remove("active"));
    if(viewMode==="power")highlightConnections(null);
  });

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.querySelector('[data-tab="detail"]').classList.add("active");
  document.getElementById("tab-detail").classList.add("active");
  rotateTo(c.lng,c.lat);
  if(viewMode==="power")highlightConnections(c.id);
}


// ── GLOBE INIT ──
const svg=d3.select("#globe-svg");
const wrap=document.getElementById("globe-wrap");
let W=wrap.clientWidth,H=wrap.clientHeight;
const projection=d3.geoOrthographic().scale(Math.min(W,H)*0.44).translate([W/2,H/2]).rotate([0,-20,0]).clipAngle(90);
const path=d3.geoPath().projection(projection);

const defs=svg.append("defs");

// ── 지구 본체 그라디언트 — 우상단 광원, 딥 네이비 계열 ──
const rg=defs.append("radialGradient").attr("id","gGrad").attr("cx","62%").attr("cy","34%").attr("r","72%");
rg.append("stop").attr("offset","0%").attr("stop-color","#1e2d50").attr("stop-opacity",1);
rg.append("stop").attr("offset","38%").attr("stop-color","#111827").attr("stop-opacity",1);
rg.append("stop").attr("offset","75%").attr("stop-color","#080d16").attr("stop-opacity",1);
rg.append("stop").attr("offset","100%").attr("stop-color","#020408").attr("stop-opacity",1);

// ── 반사광 — 오른쪽 상단 부드러운 하이라이트 ──
const specGrad=defs.append("radialGradient").attr("id","specGrad").attr("cx","68%").attr("cy","30%").attr("r","35%");
specGrad.append("stop").attr("offset","0%").attr("stop-color","rgba(180,200,255,0.12)");
specGrad.append("stop").attr("offset","50%").attr("stop-color","rgba(140,170,240,0.04)");
specGrad.append("stop").attr("offset","100%").attr("stop-color","transparent");

// ── 가장자리 암부 — 구(球) 입체감 강화 ──
const rimDark=defs.append("radialGradient").attr("id","rimDark").attr("cx","50%").attr("cy","50%").attr("r","50%");
rimDark.append("stop").attr("offset","60%").attr("stop-color","transparent");
rimDark.append("stop").attr("offset","85%").attr("stop-color","rgba(0,0,0,0.25)");
rimDark.append("stop").attr("offset","100%").attr("stop-color","rgba(0,0,0,0.6)");


// 지구 본체
const globeSphere=svg.append("circle").attr("cx",W/2).attr("cy",H/2).attr("r",projection.scale()).attr("fill","url(#gGrad)");
// 반사광 오버레이
const specHighlight=svg.append("circle").attr("cx",W/2).attr("cy",H/2).attr("r",projection.scale()).attr("fill","url(#specGrad)").attr("pointer-events","none");
// 가장자리 암부 오버레이 (대륙 위에 그려짐)
const rimOverlay=svg.append("circle").attr("cx",W/2).attr("cy",H/2).attr("r",projection.scale()).attr("fill","url(#rimDark)").attr("pointer-events","none").style("z-index",10);
const gGlobe=svg.append("g");
const gConns=svg.append("g").attr("id","connections");
const gLabels=svg.append("g").attr("id","labels");
const gMarkers=svg.append("g").attr("id","markers");
gGlobe.append("path").datum(d3.geoGraticule()()).attr("class","graticule").attr("d",path);
const topoScript=document.createElement("script");
topoScript.src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js";
document.head.appendChild(topoScript);
fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(r=>r.json()).then(world=>{
  const load=()=>{if(!window.topojson){setTimeout(load,100);return;}
    gGlobe.append("path").datum(topojson.feature(world,world.objects.countries)).attr("class","land").attr("d",path);render();};
  load();
});

// ── CONNECTION POPUP ──
const cpPopup=document.getElementById("conn-popup");
document.getElementById("cp-close").addEventListener("click",()=>{
  cpPopup.classList.remove("show");activeConnKey=null;
  Object.values(connEls).forEach(({line,baseW,baseOp})=>line.attr("stroke-width",baseW).attr("opacity",baseOp));
});
function showConnPopup(conn,mx,my){
  const r=conn.rel;
  const tc={us:"rgba(255,255,255,.13)",cn:"rgba(255,75,110,.18)",swing:"rgba(255,208,96,.18)"};
  const tt={us:"#e8e8e8",cn:"#ff4b6e",swing:"#ffd060"};
  const tn={us:"동맹·협력",cn:"협력",swing:"스윙"};
  const fa=COUNTRIES.find(c=>c.id===conn.from),ta=COUNTRIES.find(c=>c.id===conn.to);
  document.getElementById("cp-flags").textContent=`${fa.flag}${ta.flag}`;
  document.getElementById("cp-title").textContent=`${fa.name} — ${ta.name}`;
  const ct=document.getElementById("cp-type");
  ct.textContent=tn[conn.type];ct.style.background=tc[conn.type];ct.style.color=tt[conn.type];
  document.getElementById("cp-body").innerHTML=`
    <div><div class="cp-sec-label blue">📊 핵심 지표</div>
      <div class="cp-row"><span class="cp-row-label">교역 규모</span><span class="cp-row-val">${r.trade}</span></div>
      <div class="cp-row"><span class="cp-row-label">관계 유형</span><span class="cp-row-val">${r.alliance}</span></div></div>
    <div><div class="cp-sec-label green">🔗 주요 협력 사안</div>
      ${r.keyItems.map(i=>`<div class="cp-row"><span class="cp-row-label">${i.l}</span><span class="cp-row-val">${i.v}</span></div>`).join("")}</div>
    <div><div class="cp-sec-label yellow">📝 관계 요약</div><div class="cp-note">${r.note}</div></div>
    <div><div class="cp-sec-label red">👁️ 투자 시사점</div><div class="cp-watch">📌 ${r.watch}</div></div>`;
  const rect=wrap.getBoundingClientRect();
  let px=mx-rect.left+16,py=my-rect.top-10;
  if(px+315>rect.width)px=mx-rect.left-320;
  if(py+420>rect.height)py=Math.max(10,rect.height-430);
  cpPopup.style.left=px+"px";cpPopup.style.top=py+"px";
  cpPopup.classList.add("show");
}

// ── CONNECTIONS ──
let connEls={},activeConnKey=null;
const connColors={us:"rgba(26,58,143,0.90)",cn:"rgba(240,48,48,0.93)",swing:"rgba(240,184,0,0.88)",
  ally:"rgba(26,58,143,0.90)",rival:"rgba(240,48,48,0.95)",tension:"rgba(255,119,0,0.90)",
  trade:"rgba(29,185,84,0.87)",compete:"rgba(160,68,255,0.87)"};
const connWidths={us:2.0,cn:2.0,swing:1.4,ally:2.0,rival:2.6,tension:1.9,trade:1.6,compete:1.4};
const connDash={us:"none",cn:"none",swing:"6,4",ally:"none",rival:"3,3",tension:"8,4",trade:"none",compete:"4,4"};
function buildConns(){
  gConns.selectAll("*").remove();connEls={};
  CONNECTIONS.forEach(conn=>{
    const key=`${conn.from}-${conn.to}`;
    const t=conn.type;
    const baseOp=t==="rival"?0.90:t==="tension"?0.80:0.75;
    const baseW=connWidths[t]||1.5;
    const line=gConns.append("path").attr("fill","none")
      .attr("stroke",connColors[t]||"#888").attr("stroke-width",baseW)
      .attr("stroke-dasharray",connDash[t]||"none").attr("opacity",baseOp);
    const hit=gConns.append("path").attr("fill","none").attr("stroke","transparent").attr("stroke-width",18).style("cursor","pointer");
    hit.on("mouseenter",()=>line.attr("stroke-width",baseW*2.2).attr("opacity",1))
       .on("mouseleave",()=>{if(activeConnKey!==key)line.attr("stroke-width",baseW).attr("opacity",baseOp);})
       .on("click",function(ev){
         ev.stopPropagation();
         Object.entries(connEls).forEach(([k,{line:l,baseW:bw,baseOp:bo}])=>l.attr("stroke-width",k===key?bw*2.2:bw).attr("opacity",k===key?1:bo*0.18));
         activeConnKey=key;showConnPopup(conn,ev.clientX,ev.clientY);
       });
    connEls[key]={line,hit,baseW,baseOp};
  });
}
function updateConnPaths(){
  CONNECTIONS.forEach(conn=>{
    const f=COUNTRIES.find(c=>c.id===conn.from),t=COUNTRIES.find(c=>c.id===conn.to);
    if(!f||!t)return;
    const el=connEls[`${conn.from}-${conn.to}`];if(!el)return;
    const gc=d3.geoPath().projection(projection);
    const d=gc({type:"LineString",coordinates:[[f.lng,f.lat],[t.lng,t.lat]]})||"";
    el.line.attr("d",d);el.hit.attr("d",d);
    const fa=d3.geoDistance([f.lng,f.lat],[-projection.rotate()[0],-projection.rotate()[1]]);
    const ta=d3.geoDistance([t.lng,t.lat],[-projection.rotate()[0],-projection.rotate()[1]]);
    const vis=fa<Math.PI/2||ta<Math.PI/2;
    el.line.style("display",vis?"":"none");el.hit.style("display",vis?"":"none");
  });
}
function updateConnVisibility(){
  CONNECTIONS.forEach(conn=>{
    const el=connEls[`${conn.from}-${conn.to}`];if(!el)return;
    const fa=COUNTRIES.find(c=>c.id===conn.from),ta=COUNTRIES.find(c=>c.id===conn.to);
    if(!fa||!ta)return;
    const fVis=activeAligns.size===0||activeAligns.has("all")||activeAligns.has(fa.align)||activeAligns.has(ta.align);
    el.line.style("visibility",fVis?"":"hidden");el.hit.style("visibility",fVis?"":"hidden");
  });
}
function highlightConnections(id){
  if(!id){Object.values(connEls).forEach(({line,baseW,baseOp})=>line.attr("stroke-width",baseW).attr("opacity",baseOp));return;}
  Object.entries(connEls).forEach(([key,{line,baseW,baseOp}])=>{
    const [f,t]=key.split("-");const on=f===id||t===id;
    line.attr("stroke-width",on?baseW*2.2:baseW).attr("opacity",on?1:baseOp*0.15);
  });
}
svg.on("click.bg",function(ev){
  const tag=ev.target.tagName;
  if(tag==="circle"||tag==="path"){cpPopup.classList.remove("show");activeConnKey=null;Object.values(connEls).forEach(({line,baseW,baseOp})=>line.attr("stroke-width",baseW).attr("opacity",baseOp));}
});

// ── MARKERS + LABELS ──
let markerEls={};
function buildMarkers(){
  gMarkers.selectAll("*").remove();gLabels.selectAll("*").remove();markerEls={};
  COUNTRIES.forEach(c=>{
    const g=gMarkers.append("g").attr("class","marker-g");
    // outer glow ring
    const glow=g.append("circle").attr("r",9).attr("fill","none").attr("stroke-width",1).attr("opacity",.3);
    const inner=g.append("circle").attr("r",5.5).attr("stroke","rgba(255,255,255,0.55)").attr("stroke-width",1.2);
    const label=gLabels.append("text").attr("class","country-label").text(c.name).attr("text-anchor","middle").attr("dy","1.1em");
    g.on("mouseenter",function(ev){
      inner.attr("r",8.5);glow.attr("opacity",.7);
      const tt=document.getElementById("tooltip");tt.style.display="block";
      tt.innerHTML=`<b>${c.flag} ${c.name}</b><small>${c.region} · ${ALIGN_N[c.align]} · ${c.alignLabel}</small>`;
    }).on("mousemove",function(ev){
      const rect=wrap.getBoundingClientRect();const tt=document.getElementById("tooltip");
      tt.style.left=(ev.clientX-rect.left+14)+"px";tt.style.top=(ev.clientY-rect.top-10)+"px";
    }).on("mouseleave",function(){
      inner.attr("r",5.5);glow.attr("opacity",.35);
      document.getElementById("tooltip").style.display="none";
    }).on("click",function(ev){
      ev.stopPropagation();cpPopup.classList.remove("show");activeConnKey=null;
      selectCountry(c);highlightConnections(c.id);
    });
    markerEls[c.id]={g,inner,glow,label};
  });
}
function updateMarkers(){
  COUNTRIES.forEach(c=>{
    const el=markerEls[c.id];if(!el)return;
    const color=LAYER_COLORS[c.layer];
    const alignColor=ALIGN_C[c.align];
    el.inner.attr("fill",color);
    el.glow.attr("stroke",alignColor);
    const layerOk=activeLayer==="all"||c.layer===activeLayer;
    const alignOk=activeAligns.size===0||activeAligns.has("all")||activeAligns.has(c.align);
    const show=layerOk&&alignOk;
    el.g.style("display",show?"":"none");
    el.label.style("display",show?"":"none");
  });
}
function render(){
  gGlobe.selectAll(".graticule").attr("d",path);
  gGlobe.selectAll(".land").attr("d",path);
  updateConnPaths();
  COUNTRIES.forEach(c=>{
    const el=markerEls[c.id];if(!el)return;
    const coords=projection([c.lng,c.lat]);if(!coords)return;
    const angle=d3.geoDistance([c.lng,c.lat],[-projection.rotate()[0],-projection.rotate()[1]]);
    const vis=angle<Math.PI/2;
    el.g.attr("transform",`translate(${coords[0]},${coords[1]})`).style("opacity",vis?1:0).style("pointer-events",vis?"all":"none");
    const edgeFade=Math.max(0,Math.min(1,(Math.PI/2-angle)/(Math.PI/6)));
    el.label.attr("x",coords[0]).attr("y",coords[1]+4).style("opacity",vis?edgeFade*0.85:0);
  });
}

buildConns();buildMarkers();updateMarkers();render();

let dragging=false,lastPos=null,autoRotate=true,viewMode="normal";
svg.on("mousedown",e=>{dragging=true;lastPos=[e.clientX,e.clientY];autoRotate=false;document.getElementById("hint").style.opacity="0";})
   .on("mousemove",e=>{if(!dragging||!lastPos)return;const r=projection.rotate();projection.rotate([r[0]+(e.clientX-lastPos[0])*.3,Math.max(-80,Math.min(80,r[1]-(e.clientY-lastPos[1])*.3)),r[2]]);lastPos=[e.clientX,e.clientY];render();})
   .on("mouseup",()=>{dragging=false;lastPos=null;}).on("mouseleave",()=>{dragging=false;lastPos=null;});
svg.on("touchstart",e=>{if(e.touches.length===1){dragging=true;lastPos=[e.touches[0].clientX,e.touches[0].clientY];autoRotate=false;}})
   .on("touchmove",e=>{if(!dragging||!lastPos||e.touches.length!==1)return;e.preventDefault();const r=projection.rotate();projection.rotate([r[0]+(e.touches[0].clientX-lastPos[0])*.3,Math.max(-80,Math.min(80,r[1]-(e.touches[0].clientY-lastPos[1])*.3)),r[2]]);lastPos=[e.touches[0].clientX,e.touches[0].clientY];render();},{passive:false})
   .on("touchend",()=>{dragging=false;});
wrap.addEventListener("wheel",e=>{e.preventDefault();const ns=Math.max(120,Math.min(1400,projection.scale()-e.deltaY*1.8));projection.scale(ns);[globeSphere,specHighlight,rimOverlay].forEach(el=>el.attr("r",ns));render();},{passive:false});
document.getElementById("btn-zoom-in").addEventListener("click",()=>{const ns=Math.min(1400,projection.scale()*1.2);projection.scale(ns);globeSphere.attr("r",ns);specHighlight.attr("r",ns);render();});
document.getElementById("btn-zoom-out").addEventListener("click",()=>{const ns=Math.max(120,projection.scale()/1.2);projection.scale(ns);globeSphere.attr("r",ns);specHighlight.attr("r",ns);render();});
document.getElementById("btn-reset").addEventListener("click",()=>{projection.rotate([0,-20,0]).scale(Math.min(W,H)*0.44);[globeSphere,specHighlight,rimOverlay].forEach(el=>el.attr("r",projection.scale()));render();autoRotate=true;});
function rotateTo(lng,lat){
  autoRotate=false;
  const s=projection.rotate(),e=[-lng,Math.max(-80,Math.min(80,-lat)),0],ip=d3.interpolate(s,e);
  d3.transition().duration(900).tween("rotate",()=>t=>{projection.rotate(ip(t));render();});
}
setInterval(()=>{if(!autoRotate||dragging)return;const r=projection.rotate();projection.rotate([r[0]+0.08,r[1],r[2]]);render();},50);
window.addEventListener("resize",()=>{W=wrap.clientWidth;H=wrap.clientHeight;projection.translate([W/2,H/2]);[globeSphere,specHighlight,rimOverlay].forEach(el=>el.attr("cx",W/2).attr("cy",H/2));render();});
</script>
