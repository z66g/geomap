name: Daily Geopolitical Update

on:
  schedule:
    - cron: '0 22 * * *' # 매일 22:00 UTC = 07:00 KST (미국 마감 후, 아시아 개장 전)
  workflow_dispatch: # 수동 실행

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/run-pipeline.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: geopolitical update $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Pipeline failed at $(date -u +%Y-%m-%dT%H:%M)Z"
          echo "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
